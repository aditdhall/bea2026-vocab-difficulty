# BEA 2026 Closed Track — Experiment Configuration
# All experiments: per_l1: true (one model per L1)

exp0_reproduce_baseline:
  model: xlm-roberta-base
  description: "Reproduce official closed track baseline"
  per_l1: true
  component_order: "L1_source_word; L1_context; en_target_clue; en_target_word"
  batch_size: 32
  lr: 3e-5
  warmup_ratio: 0.1
  epochs: 5
  weight_decay:
    es: 0.1
    de: 0.0
    cn: 0.1
  seeds: [10]
  notes: "Match official numbers: es=1.357, de=1.328, cn=1.175. Note de has weight_decay=0."

exp05_target_scaling:
  description: "Normalize GLMM_score before training"
  per_l1: true

exp1_xgboost_features:
  model: xgboost
  description: "Feature-only baseline, no transformer"
  per_l1: true

exp2_better_transformer:
  model: microsoft/mdeberta-v3-base
  description: "Stronger encoder architecture"
  per_l1: true
  component_order: "L1_source_word; L1_context; en_target_clue; en_target_word"
  batch_size: 32
  lr: 3e-5
  warmup_ratio: 0.1
  epochs: 5
  weight_decay:
    es: 0.1
    de: 0.0
    cn: 0.1

exp3_structured_input:
  description: "Explicit field labels in input text"
  per_l1: true

exp4_hybrid_model:
  description: "Transformer CLS + frozen features + MLP — MAIN CONTRIBUTION"
  per_l1: true
  transformer_lr: 1e-5
  mlp_lr: 1e-4
  seeds: [10, 42, 123, 456, 789]

exp5_hparam_tuning:
  description: "Random search, max 15 configs"
  per_l1: true

exp6_ensemble:
  description: "5-seed average + XGBoost blend"
  per_l1: true
  seeds: [10, 42, 123, 456, 789]
